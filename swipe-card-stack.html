<!DOCTYPE html>
<html lang="sr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Swipe Card Stack — demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --frame-bg: #d6d6d6;
      /* frame bg -> back cards read as grey via opacity+blur */
      --card-bg: #ffffff;
      --ink: #0a0a0a;
      --ink-soft: #1a1a1a;
      --radius: 26px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
    }

    body {
      background: var(--frame-bg);
      color: var(--ink);
      font-family: 'Public Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 54px 16px 28px;
      overflow: hidden;
    }

    h1 {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .06em;
      color: #9aa0a6;
      text-transform: uppercase;
      margin: 0 0 26px;
    }

    .stack {
      position: relative;
      width: min(88vw, 360px);
      height: 560px;
      margin-top: 8px;
    }

    .card {
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      touch-action: none;
      user-select: none;
      will-change: transform;
      cursor: grab;
    }

    .card.dragging {
      cursor: grabbing;
    }

    /* fill = the only layer that gets opacity + blur on back cards.
     Content (avatar, elements, text) lives above it at full color/sharpness. */
    .card__fill {
      position: absolute;
      inset: 0;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: 0 6px 18px -10px rgba(0, 0, 0, .35);
      z-index: 0;
    }

    .card__content {
      position: absolute;
      inset: 26px 26px 30px;
      z-index: 1;
    }

    /* header row: avatar left, element icons right */
    .card__head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 26px;
    }

    .card__avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      overflow: hidden;
      flex: none;
    }

    .card__avatar svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .card__el {
      height: 24px;
      display: flex;
      align-items: center;
    }

    .card__el svg {
      height: 24px;
      width: auto;
      display: block;
    }

    /* type scale from spec: bold 20/22, regular 16/20, semibold 16/20 */
    .card__quote {
      font-size: 20px;
      line-height: 22px;
      font-weight: 700;
      color: var(--ink);
      margin: 0 0 20px;
      letter-spacing: -.01em;
    }

    .card__body {
      font-size: 16px;
      line-height: 20px;
      font-weight: 400;
      color: var(--ink-soft);
      margin: 0;
    }

    .card__name {
      font-size: 16px;
      line-height: 20px;
      font-weight: 600;
      color: var(--ink);
      position: absolute;
      left: 0;
      bottom: 0;
    }

    /* swipe feedback badges */
    .badge {
      position: absolute;
      top: 64px;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: .06em;
      padding: 7px 13px;
      border-radius: 9px;
      border: 2px solid currentColor;
      opacity: 0;
      pointer-events: none;
    }

    .badge--like {
      right: 0;
      color: #16a34a;
      transform: rotate(-10deg);
    }

    .badge--nope {
      left: 0;
      color: #dc2626;
      transform: rotate(10deg);
    }

    .controls {
      display: flex;
      gap: 18px;
      margin-top: 30px;
    }

    .controls button {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: #f1f3f4;
      color: #0a0a0a;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .15s ease;
    }

    .controls button:hover {
      transform: translateY(-2px);
    }

    .controls button:focus-visible {
      outline: 2px solid #0a0a0a;
      outline-offset: 3px;
    }

    .controls .nope {
      color: #dc2626;
    }

    .controls .like {
      color: #16a34a;
    }

    .empty {
      color: #9aa0a6;
      font-size: 14px;
      text-align: center;
      display: none;
    }

    .empty button {
      margin-top: 14px;
      background: #f1f3f4;
      color: #0a0a0a;
      border: none;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h1>Swipe a card left or right</h1>
  <div class="stack" id="stack"></div>
  <div class="controls">
    <button class="nope" id="btnNope" aria-label="Odbij">✕</button>
    <button class="like" id="btnLike" aria-label="Prihvati">♥</button>
  </div>
  <div class="empty" id="emptyState">
    No more cards.
    <br>
    <button id="btnReset">Reset</button>
  </div>

    const stackEl = document.getElementById('stack');
    const emptyState = document.getElementById('emptyState');

    function buildCard(item) {
      const el = document.createElement('div');
      el.className = 'card';
      el.innerHTML = `
      <div class="card__fill"></div>
      <div class="card__content">
        <div class="card__head">
          <div class="card__avatar">${AVATARS[item.asset]}</div>
          <div class="card__el">${ELEMENTS[item.asset]}</div>
        </div>
        <div class="badge badge--like">LIKE</div>
        <div class="badge badge--nope">NOPE</div>
        <p class="card__quote">${item.quote}</p>
        <p class="card__body">${item.body}</p>
        <p class="card__name">${item.name}</p>
      </div>`;
      return el;
    }

    let order = []; // order[0] je trenutno gornja, aktivna kartica

    function renderInitial() {
      stackEl.innerHTML = '';
      order = DATA.map(buildCard);
      order.forEach(c => stackEl.appendChild(c));
      stackEl.style.display = '';
      emptyState.style.display = 'none';
      layout();
    }

    function layout() {
      const tCard = reducedMotion ? 'transform .1s linear' : 'transform .3s ease';
      const tFill = reducedMotion ? 'background .1s linear'
        : 'background .3s ease, backdrop-filter .3s ease, -webkit-backdrop-filter .3s ease';

      order.forEach((card, i) => {
        card.style.zIndex = order.length - i;   // i=0 najviši; zadnje painted ranije -> blur ih hvata
        card.style.transition = tCard;
        card.style.opacity = 1;

        const fill = card.querySelector('.card__fill');
        fill.style.transition = tFill;

        if (i > STACK_MAX_VISIBLE - 1) { card.style.display = 'none'; return; }
        card.style.display = '';

        if (i === 0) {
          // aktivna kartica: bela, oštra, bez blura
          fill.style.background = 'var(--card-bg)';
          fill.style.backdropFilter = 'none';
          fill.style.webkitBackdropFilter = 'none';
          card.style.transform = 'translateY(0) scale(1)';
        } else {
          // zadnje kartice: poluprozirna siva prevlaka + backdrop blur ->
          // kartica IZA se VIDI ali je ZAMUĆENA kroz ovu
          fill.style.background = BACK_TINT;
          fill.style.backdropFilter = `blur(${BACK_BLUR_PX}px)`;
          fill.style.webkitBackdropFilter = `blur(${BACK_BLUR_PX}px)`;
          const lift = i * STACK_LIFT_PX;
          const scale = 1 - i * STACK_SCALE_STEP;
          card.style.transform = `translateY(-${lift}px) scale(${scale})`;
        }
      });

      if (order.length === 0) {
        stackEl.style.display = 'none';
        emptyState.style.display = 'block';
      }
    }

    /* =========================================================
       DRAG LOGIKA — Pointer Events pokrivaju i touch i mouse,
       pa ne treba duplirati kod za desktop/mobile
       ========================================================= */
    let dragging = false, startX = 0, startY = 0, dx = 0, dy = 0, cardWidth = 0, activePointerId = null;

    function topCard() { return order[0]; }

    stackEl.addEventListener('pointerdown', (e) => {
      const card = e.target.closest('.card');
      if (!card || card !== topCard()) return; // samo gornja kartica reaguje
      dragging = true;
      activePointerId = e.pointerId;
      card.setPointerCapture(e.pointerId);
      cardWidth = card.offsetWidth;
      startX = e.clientX;
      startY = e.clientY;
      card.style.transition = 'none'; // ključno: ukida tranziciju da kartica "lepi" za prst 1:1
      card.classList.add('dragging');
    });

    stackEl.addEventListener('pointermove', (e) => {
      if (!dragging || e.pointerId !== activePointerId) return;
      const card = topCard();
      dx = e.clientX - startX;
      dy = e.clientY - startY;
      const rotate = reducedMotion ? 0 : dx / ROTATION_DIVISOR;
      card.style.transform = `translate(${dx}px, ${dy}px) rotate(${rotate}deg)`;

      const threshold = cardWidth * THRESHOLD_RATIO;
      const progress = Math.min(Math.abs(dx) / threshold, 1);
      card.querySelector('.badge--like').style.opacity = dx > 0 ? progress : 0;
      card.querySelector('.badge--nope').style.opacity = dx < 0 ? progress : 0;
    });

    function endDrag(e) {
      if (!dragging || (activePointerId !== null && e.pointerId !== activePointerId)) return;
      dragging = false;
      const card = topCard();
      card.classList.remove('dragging');
      try { card.releasePointerCapture(activePointerId); } catch (_) { }

      const threshold = cardWidth * THRESHOLD_RATIO;
      if (Math.abs(dx) > threshold) {
        release(card, dx > 0 ? 1 : -1); // prešao granicu -> odleti
      } else {
        snapBack(card);                 // nije prešao -> vrati se na sredinu
      }
      dx = 0; dy = 0; activePointerId = null;
    }
    stackEl.addEventListener('pointerup', endDrag);
    stackEl.addEventListener('pointercancel', endDrag);
    stackEl.addEventListener('pointerleave', (e) => { if (dragging) endDrag(e); });

    function snapBack(card) {
      card.style.transition = reducedMotion ? 'transform .1s linear' : `transform ${SNAP_DURATION}ms cubic-bezier(.2,.8,.2,1)`;
      card.style.transform = 'translate(0,0) rotate(0deg)';
      card.querySelector('.badge--like').style.opacity = 0;
      card.querySelector('.badge--nope').style.opacity = 0;
    }

    function release(card, direction) {
      const flyX = direction * window.innerWidth;
      const flyY = dy * 1.4;
      const rotate = reducedMotion ? 0 : direction * 24;
      card.style.transition = reducedMotion
        ? 'transform .15s linear, opacity .15s linear'
        : `transform ${FLY_DURATION}ms ease-out, opacity ${FLY_DURATION}ms ease-out`;
      card.style.transform = `translate(${flyX}px, ${flyY}px) rotate(${rotate}deg)`;
      card.style.opacity = 0;
      card.addEventListener('transitionend', function onEnd() {
        card.removeEventListener('transitionend', onEnd);
        card.remove();
        order.shift();
        layout();
      }, { once: true });
    }

    document.getElementById('btnLike').addEventListener('click', () => { if (topCard()) release(topCard(), 1); });
    document.getElementById('btnNope').addEventListener('click', () => { if (topCard()) release(topCard(), -1); });
    document.getElementById('btnReset').addEventListener('click', renderInitial);

    renderInitial();
  </script>
</body>

</html>
